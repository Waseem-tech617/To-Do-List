<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CALL REMINDER APP</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="call-container">
        <div class="btns">
            <button class="add btn "> <i class="fa-solid fa-plus"></i></button>
            <button class="arrow-up btn"><i class="fa-solid fa-arrow-up"></i></button>
            <button class="arrow-down btn"> <i class="fa-solid fa-arrow-down"></i></button>
        </div>
        <div class="cards">
            <div class="card-1"></div>
            <div class="card-2"></div>
            <div class="card-3">
                <img src="images/pic2.jpg" alt="">
                <h2>Waseem Amin</h2>
                <h4 class="Home">Home Town</h4>
                <h4 class="city">lahore</h4>
                <h4>Bookings</h4>
                <h4 class="Bookings"> 3times</h4>
                <button class="call"><i class="fa-solid fa-phone"></i> Call</button>
                <h3 class="massage">Massage</h3>

            </div>
        </div>
        <div class="colors">
            <div class="color-1"></div>
            <div class="color-2"></div>
            <div class="color-3"></div>
            <div class="color-4"></div>
        </div>
    </div>













    <script src="script.js"></script>
</body>

</html>
